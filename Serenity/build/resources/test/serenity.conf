# =============================================================================
# serenity.conf — Configuración de Serenity BDD
# Proyecto: Sistema de Pedidos de Restaurante — Automatización QA
# Ubicación: src/test/resources/serenity.conf
# =============================================================================

# ---------------------------------------------------------------------------
# 1. METADATOS DEL PROYECTO
# ---------------------------------------------------------------------------
# Estos valores aparecen en el encabezado del reporte HTML y ayudan a
# identificar las ejecuciones de pruebas.
serenity {
  project.name = "Sistema de Pedidos de Restaurante"

  # Configuración de etiquetas para reportes a nivel de requisitos.
  tag.failures = "true"

  # Tomar capturas de pantalla solo en fallos (ahorra I/O de disco).
  # Opciones: FOR_FAILURES, FOR_EACH_ACTION, BEFORE_AND_AFTER_EACH_STEP, DISABLED
  take.screenshots = FOR_FAILURES

  # Nivel de logging para Serenity: VERBOSE, NORMAL, QUIET
  logging = VERBOSE

  # Colores en la salida de consola
  console.colors = true
}

# ---------------------------------------------------------------------------
# 2. CONFIGURACIÓN DE WEBDRIVER
# ---------------------------------------------------------------------------
# Aunque el proyecto se enfoca en pruebas de API, la configuración de
# WebDriver está lista para futura expansión a pruebas de UI (frontend React).
# Para pruebas puramente de API, esta sección está inactiva pero preparada.
webdriver {
  driver = chrome

  # Descargar automáticamente la versión correcta de ChromeDriver
  autodownload = true

  # Opciones específicas de Chrome
  capabilities {
    browserName = "chrome"

    "goog:chromeOptions" {
      args = [
        "--headless=new",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1920,1080",
        "--remote-allow-origins=*",
        "--disable-extensions"
      ]
    }
  }
}

# ---------------------------------------------------------------------------
# 3. CONFIGURACIÓN DE API REST
# ---------------------------------------------------------------------------
# Define la URL base que SerenityRest y el Screenplay REST usarán.
# Se sobreescribe por entorno en la sección de environments.
restapi {
  baseurl = "http://localhost:8080"
}

# ---------------------------------------------------------------------------
# 4. PERFILES DE ENTORNO
# ---------------------------------------------------------------------------
# Serenity soporta configuración específica por entorno.
# Uso: gradle test -Denvironment=staging
#
# Cada bloque de entorno sobreescribe los valores por defecto.
environments {

  # ── Desarrollo Local (por defecto) ───────────────────────────────────
  # Coincide con la configuración de Docker Compose:
  #   - order-service   → localhost:8080
  #   - kitchen-worker  → localhost:8081
  #   - report-service  → localhost:8082
  #   - RabbitMQ Mgmt   → localhost:15672
  default {
    restapi.baseurl = "http://localhost:8080"

    # URLs base específicas por servicio
    order.service.baseurl   = "http://localhost:8080"
    report.service.baseurl  = "http://localhost:8082"
    kitchen.service.baseurl = "http://localhost:8081"

    # Token de seguridad de cocina para endpoints autenticados
    # (PATCH /orders/{id}/status, DELETE /orders/{id}, DELETE /orders)
    kitchen.token = "valid-kitchen-token"

    # Conexión a base de datos (para setup/teardown de datos en pruebas)
    db {
      url      = "jdbc:postgresql://localhost:5432/order_db"
      username = "postgres"
      password = "postgres"
    }
  }

  # ── Entorno de Staging ───────────────────────────────────────────────
  staging {
    restapi.baseurl = "https://staging-api.restaurant.com"

    order.service.baseurl   = "https://staging-api.restaurant.com"
    report.service.baseurl  = "https://staging-reports.restaurant.com"
    kitchen.service.baseurl = "https://staging-kitchen.restaurant.com"
    kitchen.token = "${KITCHEN_TOKEN_STAGING}"

    db {
      url      = "jdbc:postgresql://staging-db.restaurant.com:5432/order_db"
      username = "${DB_USER_STAGING}"
      password = "${DB_PASS_STAGING}"
    }
  }

  # ── Entorno CI/CD ────────────────────────────────────────────────────
  # Para GitHub Actions u otros pipelines de integración continua.
  # Los nombres de host coinciden con los servicios de Docker Compose en CI.
  ci {
    restapi.baseurl = "http://order-service:8080"

    order.service.baseurl   = "http://order-service:8080"
    report.service.baseurl  = "http://report-service:8082"
    kitchen.service.baseurl = "http://kitchen-worker:8081"
    kitchen.token = "${KITCHEN_TOKEN_CI}"

    headless.mode = true

    db {
      url      = "jdbc:postgresql://postgres:5432/order_db"
      username = "postgres"
      password = "${DB_PASS_CI}"
    }
  }
}

# ---------------------------------------------------------------------------
# 5. CONFIGURACIÓN DE REPORTES
# ---------------------------------------------------------------------------
serenity {
  # Directorio de salida para resultados y reportes HTML
  outputDirectory = "target/site/serenity"

  # Configuración del contenido del reporte
  report {
    # Mostrar cuerpos completos de request/response REST en el reporte.
    # Crítico para depurar fallos en pruebas de contrato de API.
    show.rest.request.and.response = true

    # Incluir tiempos de ejecución por paso
    show.step.details = true

    # Mostrar pruebas manuales documentadas (@manual) junto a las automatizadas
    show.manual.tests = true
  }

  # Jerarquía de tipos de requisitos para la navegación del reporte:
  #   Capacidad → Feature → Historia
  requirement.types = "capability, feature, story"
}

# ---------------------------------------------------------------------------
# 6. CONFIGURACIÓN DE CUCUMBER
# ---------------------------------------------------------------------------
cucumber {
  # Paquete base donde Cucumber busca los métodos @Given, @When, @Then
  glue = "com.restaurant.qa.stepdefinitions"

  # Ubicación de los archivos .feature (escenarios Gherkin)
  features = "src/test/resources/features"

  # Plugin para generar resultados compatibles con Serenity
  plugin = [
    "io.cucumber.core.plugin.SerenityReporterParallelPlugin"
  ]

  # Estilo de nombrado para los snippets de código sugeridos
  snippet-type = "camelCase"
}

# ---------------------------------------------------------------------------
# 7. TIMEOUTS Y RESILIENCIA
# ---------------------------------------------------------------------------
# Controlan cuánto tiempo espera Serenity antes de reportar un fallo.
# Ajustar según el tiempo de respuesta de tus servicios.
serenity {
  # Espera implícita para WebDriver en milisegundos (pruebas de UI)
  timeout = 15000

  # Timeouts de API REST
  rest {
    # Tiempo máximo para establecer conexión (ms)
    connection.timeout = 10000

    # Tiempo máximo para leer la respuesta (ms)
    read.timeout = 30000
  }
}

# =============================================================================
# cucumber.properties - Enlace entre Cucumber y Serenity
# =============================================================================
# Este archivo asegura que Cucumber encuentre el reporter de Serenity
# incluso cuando se ejecuta fuera del TestRunner (ej., desde un IDE).

# Configuracion de ejecucion
cucumber.execution.parallel.enabled=false

# Plugin de reportes
cucumber.plugin=io.cucumber.core.plugin.SerenityReporter

# Ubicacion de step definitions (glue)
cucumber.glue=com.restaurant.qa.stepdefinitions

# Ubicacion de archivos .feature
cucumber.features=src/test/resources/features
